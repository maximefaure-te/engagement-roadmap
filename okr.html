<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKR Map</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
  background: #f2ede3;
  color: #1a1a1a;
  min-height: 100vh;
}

nav {
  display: flex;
  align-items: center;
  padding: 0 28px;
  background: #fff;
  border-bottom: 1px solid #d4cec4;
  height: 44px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-brand { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #1a1a1a; margin-right: 24px; text-decoration: none; }
.nav-tab { display: inline-flex; align-items: center; height: 44px; padding: 0 16px; font-size: 12px; font-family: inherit; color: #666; text-decoration: none; border-bottom: 2px solid transparent; letter-spacing: .02em; }
.nav-tab:hover { color: #1a1a1a; }
.nav-tab.active { color: #E3120B; border-bottom-color: #E3120B; font-weight: 600; }

.page { padding: 28px 28px 60px; }

.page-hdr { margin-bottom: 20px; }
.page-hdr h1 { font-size: 18px; font-weight: 700; }
.page-hdr .sub { font-size: 12px; color: #999; margin-top: 3px; }

.controls {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.view-tabs { display: flex; border: 1px solid #c8c0b0; border-radius: 3px; overflow: hidden; }
.view-tab-btn {
  padding: 7px 15px;
  background: #fff;
  border: none;
  border-right: 1px solid #c8c0b0;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  color: #555;
  letter-spacing: .03em;
}
.view-tab-btn:last-child { border-right: none; }
.view-tab-btn.active { background: #E3120B; color: #fff; font-weight: 600; }
.filter-group { display: flex; align-items: center; gap: 7px; }
.filter-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .06em; }
select {
  padding: 7px 10px;
  border: 1px solid #c8c0b0;
  border-radius: 3px;
  font-size: 12px;
  font-family: inherit;
  background: #fff;
  color: #1a1a1a;
  cursor: pointer;
}
.hint { font-size: 11px; color: #aaa; font-style: italic; margin-left: auto; }

#diagram {
  display: flex;
  align-items: flex-start;
  gap: 0;
  position: relative;
}

#left-panel {
  width: 380px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

#svg-area {
  flex: 1;
  position: relative;
  min-width: 80px;
}

#conn-svg {
  position: absolute;
  top: 0; left: 0;
  overflow: visible;
  pointer-events: none;
}

#right-panel {
  width: 260px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.goal-section { display: flex; gap: 8px; transition: opacity .2s; }
.goal-lbl {
  width: 72px;
  flex-shrink: 0;
  border-radius: 6px;
  padding: 10px 7px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  text-align: center;
  color: #fff;
}
.goal-lbl-n { font-size: 10px; font-weight: 700; opacity: .7; letter-spacing: .06em; text-transform: uppercase; }
.goal-lbl-name { font-size: 10px; font-weight: 700; line-height: 1.3; }
.kr-group { flex: 1; display: flex; flex-direction: column; gap: 7px; }

.kr-box {
  background: #fff;
  border-radius: 5px;
  border-left: 3px solid #ccc;
  padding: 9px 11px;
  cursor: default;
  transition: box-shadow .15s, opacity .2s;
  box-shadow: 0 1px 2px rgba(0,0,0,.05);
}
.kr-box:hover { box-shadow: 0 2px 8px rgba(0,0,0,.12); }
.kr-box.dimmed { opacity: .2; }
.kr-lbl { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 3px; }
.kr-desc { font-size: 11.5px; line-height: 1.4; color: #444; }

.init-box {
  background: #fff;
  border-radius: 5px;
  border: 1px solid #ddd8cc;
  padding: 8px 10px;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: default;
  transition: box-shadow .15s, opacity .2s;
  box-shadow: 0 1px 2px rgba(0,0,0,.04);
  min-height: 38px;
}
.init-box:hover { box-shadow: 0 2px 8px rgba(0,0,0,.1); }
.init-box.dimmed { opacity: .2; }
.init-name { font-size: 11.5px; font-weight: 500; flex: 1; line-height: 1.3; }
.init-badge {
  display: inline-block;
  font-size: 9.5px;
  padding: 1px 5px;
  border-radius: 8px;
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
}
.r-now    { color: #2f7a2f; background: #eaf5ea; }
.r-next   { color: #b86d00; background: #fff3e0; }
.r-later  { color: #c0321e; background: #fde8e6; }
.r-backlog{ color: #888;    background: #eee; }
.t-web  { background: #ddeeff; color: #2255aa; }
.t-disc { background: #eeddf5; color: #7733aa; }
.t-core { background: #ddf5ee; color: #226644; }
.t-av   { background: #fff0dd; color: #aa5500; }
.t-ads  { background: #fff5dd; color: #886600; }
</style>

function populateSelect() {
  var sel = document.getElementById("filter-select");
  sel.innerHTML = "";
  var items = viewMode === "goal"
    ? GOALS
    : [{name:"Web, NL & GenAI"},{name:"Discovery & Personalisation"},{name:"Core App"},{name:"Audio & Video"},{name:"Ad experience"}];
  items.forEach(function(item, i) {

    sel.appendChild(o);
  });

function render() {
  renderLeft();

function renderLeft() {
  var panel = document.getElementById("left-panel");
  panel.innerHTML = "";
  GOALS.forEach(function(goal, gi) {
    var dim = (viewMode === "goal") && (gi !== filterIdx);
    var sec = document.createElement("div");
    sec.className = "goal-section";
    sec.style.opacity = dim ? "0.22" : "1";

    var lbl = document.createElement("div");
    lbl.className = "goal-lbl";
    lbl.style.background = goal.c;
    lbl.innerHTML = "<span class='goal-lbl-n'>G"+(gi+1)+"</span><span class='goal-lbl-name'>"+goal.name+"</span>";

    var grp = document.createElement("div");
    grp.className = "kr-group";
    KRS.forEach(function(kr) {
      if (kr.g !== gi) return;
      var box = document.createElement("div");
      box.className = "kr-box";
      box.dataset.kr = kr.id;
      box.style.borderLeftColor = goal.c;
      box.innerHTML = "<div class='kr-lbl' style='color:"+goal.c+"'>"+kr.lbl+"</div><div class='kr-desc'>"+kr.desc+"</div>";
      box.addEventListener("mouseenter", function() { onHoverKr(kr.id); });
      box.addEventListener("mouseleave",  unhover);
      grp.appendChild(box);
    });

    sec.appendChild(lbl);
    sec.appendChild(grp);
    panel.appendChild(sec);
  });
}

function renderRight() {
  var panel = document.getElementById("right-panel");
  panel.innerHTML = "";
  var feats = FEATURES.filter(function(f) {
    return viewMode === "goal" ? f.g === filterIdx : f.ti === filterIdx;
  });
  feats.sort(function(a,b) { return R_ORDER[a.r] - R_ORDER[b.r]; });

    var box = document.createElement("div");
    box.className = "init-box";

function draw() {
  var svg     = document.getElementById("conn-svg");
  var diag    = document.getElementById("diagram");
  var svgArea = document.getElementById("svg-area");
  var diagRect    = diag.getBoundingClientRect();
  var svgAreaRect = svgArea.getBoundingClientRect();
  var offX = svgAreaRect.left - diagRect.left;

  var krRects   = {};
  var initRects = {};
  document.querySelectorAll(".kr-box").forEach(function(el) {
    var r = el.getBoundingClientRect();
    krRects[el.dataset.kr] = { cy: (r.top+r.bottom)/2-diagRect.top, right: r.right-diagRect.left };
  });
  document.querySelectorAll(".init-box").forEach(function(el) {
    var r = el.getBoundingClientRect();
    initRects[parseInt(el.dataset.fi)] = { cy: (r.top+r.bottom)/2-diagRect.top, left: r.left-diagRect.left };
  });

  var visible = CONNECTIONS.filter(function(c) { return krRects[c[0]] && initRects[c[1]]; });
  if (!visible.length) { svg.innerHTML=""; allPaths=[]; svgArea.style.height="10px"; return; }

  var byKr={}, byInit={};
  visible.forEach(function(c) {
    if (!byKr[c[0]])   byKr[c[0]]  =[];
    if (!byInit[c[1]]) byInit[c[1]]=[];
    byKr[c[0]].push(c[1]);
    byInit[c[1]].push(c[0]);
  });
  Object.keys(byKr).forEach(function(k)  { byKr[k].sort(function(a,b)  { return (initRects[a]?initRects[a].cy:0)-(initRects[b]?initRects[b].cy:0); }); });
  Object.keys(byInit).forEach(function(k){ byInit[k].sort(function(a,b){ return (krRects[a]?krRects[a].cy:0)-(krRects[b]?krRects[b].cy:0); }); });

  var SPREAD = 7;
  function exitY(kid,fi)  { var g=byKr[kid];   var i=g.indexOf(fi);  return krRects[kid].cy  +(i-(g.length-1)/2)*SPREAD; }
  function entryY(fi,kid) { var g=byInit[fi];   var i=g.indexOf(kid); return initRects[fi].cy +(i-(g.length-1)/2)*SPREAD; }

  var allCY=[];
  Object.keys(krRects).forEach(function(k)  { allCY.push(krRects[k].cy); });
  Object.keys(initRects).forEach(function(k){ allCY.push(initRects[k].cy); });
  var maxH = Math.max.apply(null,allCY)+40;
  svgArea.style.height = maxH+"px";
  svg.setAttribute("width",  svgAreaRect.width);
  svg.setAttribute("height", maxH);
  svg.innerHTML=""; allPaths=[];

  var goalColors={};
  KRS.forEach(function(kr){ goalColors[kr.id]=GOALS[kr.g].c; });

  visible.forEach(function(c) {
    var kid=c[0],fi=c[1];
    var x1=krRects[kid].right-offX, x2=initRects[fi].left-offX;
    var y1=exitY(kid,fi), y2=entryY(fi,kid);
    var cp=(x2-x1)*0.5;
    var d="M"+x1+" "+y1+" C"+(x1+cp)+" "+y1+","+(x2-cp)+" "+y2+","+x2+" "+y2;
    var path=document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d",d);
    path.setAttribute("fill","none");
    path.setAttribute("stroke",goalColors[kid]);
    path.setAttribute("stroke-width",DEFAULT_STROKE);
    path.setAttribute("opacity",DEFAULT_OPACITY);
    path.setAttribute("stroke-linecap","round");
    svg.appendChild(path);
    allPaths.push({el:path,kid:kid,fi:fi});
  });
}

function onHoverKr(kid) {
  allPaths.forEach(function(p) {
    var on=p.kid===kid;
    p.el.setAttribute("opacity",on?"0.92":"0.05");
    p.el.setAttribute("stroke-width",on?"2.5":"1.2");
  });
  document.querySelectorAll(".kr-box").forEach(function(el)   { el.classList.toggle("dimmed",el.dataset.kr!==kid); });
  var fis=CONNECTIONS.filter(function(c){return c[0]===kid;}).map(function(c){return c[1];});
  document.querySelectorAll(".init-box").forEach(function(el) { el.classList.toggle("dimmed",fis.indexOf(parseInt(el.dataset.fi))===-1); });
}

function onHoverInit(fi) {
  allPaths.forEach(function(p) {
    var on=p.fi===fi;
    p.el.setAttribute("opacity",on?"0.92":"0.05");
    p.el.setAttribute("stroke-width",on?"2.5":"1.2");
  });
  var krs=CONNECTIONS.filter(function(c){return c[1]===fi;}).map(function(c){return c[0];});
  document.querySelectorAll(".kr-box").forEach(function(el)   { el.classList.toggle("dimmed",krs.indexOf(el.dataset.kr)===-1); });
  document.querySelectorAll(".init-box").forEach(function(el) { el.classList.toggle("dimmed",parseInt(el.dataset.fi)!==fi); });
}

function unhover() {
  allPaths.forEach(function(p) {
    p.el.setAttribute("opacity",DEFAULT_OPACITY);
    p.el.setAttribute("stroke-width",DEFAULT_STROKE);
  });
  document.querySelectorAll(".kr-box,.init-box").forEach(function(el){ el.classList.remove("dimmed"); });
}

document.querySelectorAll(".view-tab-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    viewMode=btn.dataset.mode; filterIdx=0;
    document.querySelectorAll(".view-tab-btn").forEach(function(b){ b.classList.remove("active"); });
    btn.classList.add("active");
    populateSelect(); render();
  });
});
document.getElementById("filter-select").addEventListener("change", function() {
  filterIdx=parseInt(this.value); render();
});

populateSelect();
if (document.readyState==="loading") {
  document.addEventListener("DOMContentLoaded", render);
} else { render(); }
window.addEventListener("resize", draw);
</script>
</body>
</html>
