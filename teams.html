<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engagement Teams</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
  background: #f2ede3;
  color: #1a1a1a;
  min-height: 100vh;
}

/* ── NAV ─────────────────────────────────────────────────────────── */
nav {
  display: flex;
  align-items: center;
  padding: 0 28px;
  background: #fff;
  border-bottom: 1px solid #d4cec4;
  height: 44px;
}
.nav-brand {
  font-size: 11px; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase; color: #1a1a1a; margin-right: 24px; text-decoration: none;
}
.nav-tab {
  display: inline-flex; align-items: center; height: 44px; padding: 0 16px;
  font-size: 12px; font-family: inherit; color: #666; text-decoration: none;
  border-bottom: 2px solid transparent; transition: color .12s, border-color .12s;
  letter-spacing: .02em;
}
.nav-tab:hover { color: #1a1a1a; }
.nav-tab.active { color: #E3120B; border-bottom-color: #E3120B; font-weight: 600; }

/* ── PAGE ────────────────────────────────────────────────────────── */
.page { max-width: 1000px; margin: 0 auto; padding: 36px 28px 60px; }

.page-header { margin-bottom: 24px; }
.page-header h1 { font-size: 15px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: #1a1a1a; }
.page-header p { font-size: 12px; color: #888; margin-top: 4px; font-style: italic; }

/* ── TEAM ROWS ───────────────────────────────────────────────────── */
.teams { display: flex; flex-direction: column; gap: 6px; }

.team-row {
  border-radius: 8px;
  overflow: hidden;
  border: 0.5px solid #d4cec4;
}

/* ── HEADER (always visible, navy) ──────────────────────────────── */
.team-header {
  background: #1a3a6e;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  user-select: none;
  transition: background .12s;
}
.team-header:hover { background: #1e4480; }

.team-name { font-size: 13px; font-weight: 600; color: #fff; flex: 1; }

.obj-row { display: flex; gap: 5px; flex-wrap: wrap; }
.obj-pill {
  font-size: 9.5px; font-weight: 500; color: #fff; opacity: .8;
  border: 1px solid rgba(255,255,255,.3);
  padding: 1px 8px; border-radius: 20px; white-space: nowrap;
}

.chevron-t {
  font-size: 14px; color: rgba(255,255,255,.55);
  transition: transform .22s ease; flex-shrink: 0; line-height: 1;
}
.team-row.open .chevron-t { transform: rotate(180deg); }

/* ── SUMMARY (collapsed body) ────────────────────────────────────── */
.team-summary {
  background: #fff;
  padding: 13px 16px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 20px;
  align-items: start;
}

.mission-text { font-size: 12px; color: #555; line-height: 1.65; }

.eng-breakdown { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
.eng-breakdown-title {
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
  color: #bbb; margin-bottom: 3px;
}
.eng-tags { display: flex; flex-direction: column; gap: 3px; align-items: flex-end; }

.eng-tag {
  font-size: 10px; color: #1a3a6e;
  background: #eef3ff; border: 0.5px solid #9ab0e0;
  padding: 2px 9px; border-radius: 4px; white-space: nowrap;
}
.eng-tag.qa  { background: #f0f8ee; border-color: #a8d4a0; color: #2a6e22; }
.eng-tag.em  { background: #f5f0ff; border-color: #b8a0e0; color: #4a2a8e; }

/* ── ROSTER (expanded) ───────────────────────────────────────────── */
.team-roster { max-height: 0; overflow: hidden; transition: max-height .35s ease; }
.team-row.open .team-roster { max-height: 1000px; }

.roster-inner {
  background: #fafaf8;
  border-top: 0.5px solid #ede8e0;
  padding: 16px 18px 18px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Row 1: Product / Design / Delivery */
.roster-top { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px 18px; }

/* Row 2: Engineering — 1, 2 or 3 cols */
.roster-eng { }
.eng-section-label {
  display: inline-block;
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em;
  color: #1a3a6e; background: #eef3ff; border: 0.5px solid #9ab0e0;
  padding: 3px 10px; border-radius: 4px; margin-bottom: 10px;
}
.eng-grid { display: grid; gap: 10px 16px; }
.eng-grid.cols-1 { grid-template-columns: 1fr; }
.eng-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
.eng-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }

.role-col { }
.role-label {
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em;
  color: #bbb; margin-bottom: 6px; padding-bottom: 4px;
  border-bottom: 0.5px solid #ede8e0;
}
.person {
  font-size: 11px; color: #555; line-height: 1.45;
  padding: 3px 0; border-bottom: 0.5px solid #f5f2ee;
}
.person:last-child { border-bottom: none; }
.person .ptitle { font-size: 10px; color: #aaa; display: block; }
.person.tbd { color: #bbb; font-style: italic; }
.person.tbd .ptitle { color: #ccc; }
</style>
</head>

    /* ── header ── */
    var objHtml = team.objs.map(function (o) {
      return '<span class="obj-pill">' + o + '</span>';
    }).join('');

    /* ── eng summary tags ── */

      return '<span class="eng-tag ' + e.cls + '">' + e.label + '</span>';
    }).join('');

    /* ── top row: Product / Design / Delivery ── */

      var people = team.top[role].map(function (p) {
        if (p.n === '—') return '<div class="person" style="color:#ddd">—</div>';

               (p.t ? '<span class="ptitle">' + p.t + '</span>' : '') + '</div>';
      }).join('');
      return '<div class="role-col"><div class="role-label">' + role + '</div>' + people + '</div>';

    /* ── engineering grid ── */
    var ec   = team.engineers.length;
    var cols = ec <= 4 ? 1 : ec <= 8 ? 2 : 3;
    var per  = Math.ceil(ec / cols);
    var engGridHtml = '';
    for (var i = 0; i < ec; i += per) {
      var slice = team.engineers.slice(i, i + per);
      engGridHtml += '<div class="role-col">' + slice.map(function (p) {
        return '<div class="person' + (p.tbd ? ' tbd' : '') + '">' + p.n +
               '<span class="ptitle">' + p.t + '</span></div>';

          '</div>' +
        '</div>' +
      '</div>';

    row.querySelector('.team-header').addEventListener('click', function () {
      row.classList.toggle('open');
    });

    container.appendChild(row);
  });
})();
